name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            exe: pdf-filler.exe
          - os: ubuntu-latest
            rid: linux-x64
            exe: pdf-filler
          - os: macos-13
            rid: osx-x64
            exe: pdf-filler
          - os: macos-latest
            rid: osx-arm64
            exe: pdf-filler

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish src/PdfFiller/PdfFiller.csproj /p:PublishProfile=${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf-filler-${{ matrix.rid }}
          path: src/PdfFiller/publish/${{ matrix.rid }}/${{ matrix.exe }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename artifacts
        run: |
          mv artifacts/pdf-filler-win-x64/pdf-filler.exe  artifacts/pdf-filler-win-x64.exe
          mv artifacts/pdf-filler-linux-x64/pdf-filler     artifacts/pdf-filler-linux-x64
          mv artifacts/pdf-filler-osx-x64/pdf-filler       artifacts/pdf-filler-osx-x64
          mv artifacts/pdf-filler-osx-arm64/pdf-filler     artifacts/pdf-filler-osx-arm64
          chmod +x artifacts/pdf-filler-linux-x64 artifacts/pdf-filler-osx-x64 artifacts/pdf-filler-osx-arm64

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/pdf-filler-win-x64.exe
            artifacts/pdf-filler-linux-x64
            artifacts/pdf-filler-osx-x64
            artifacts/pdf-filler-osx-arm64
